<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thi Bằng Lái Xe 2026</title>

<style>
body{
  font-family: Arial;
  background: #f2f4f8;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  padding:20px;
}

.container{
  width:600px;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.15);
}

h1{
  text-align:center;
  color:#d32f2f;
  margin-top:0;
  font-size:28px;
  font-weight:bold;
}

.question{
  font-size:20px;
  margin-bottom:15px;
  font-weight:bold;
  line-height:1.4;
}

.btn{
  display:block;
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  background:#e0e0e0;
  cursor:pointer;
  font-size:16px;
  transition:0.2s;
  text-align:left;
}

.btn:hover{
  background:#cfd8dc;
}

.btn:disabled{
  background:#9e9e9e;
  color:#666;
  cursor:not-allowed;
}

.next{
  background:#1976d2;
  color:white;
  font-weight:bold;
  margin-top:20px;
}

.next:hover:not(:disabled){
  background:#0d47a1;
}

.feedback{
  margin-top:10px;
  font-weight:bold;
  font-size:18px;
}

.result{
  text-align:center;
  font-size:24px;
  color:green;
  margin-top:20px;
  font-weight:bold;
}

.progress{
  text-align:center;
  color:#666;
  margin-bottom:15px;
  font-size:14px;
}

.warning{
  background:#fff3cd;
  border:1px solid #ffeaa7;
  color:#856404;
  padding:10px;
  border-radius:5px;
  margin-bottom:15px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">
  <h1>THI TRẮC NGHIỆM VOVINAM</h1>
  
  <div class="warning">
    ⚠️ <strong>Lưu ý:</strong> Bài thi gồm 20 câu hỏi về lịch sử và kiến thức Vovinam. Điểm đạt: 14/20 câu đúng.
  </div>
  
  <div class="progress" id="progress"></div>
  <div class="question" id="question"></div>
  <div id="answers"></div>

  <div class="feedback" id="feedback"></div>

  <button class="btn next" id="nextBtn" onclick="nextQuestion()">Câu tiếp</button>

  <div class="result" id="result"></div>
</div>

<script>
const questions = [
  {
    question: "Người sáng lập Vovinam là ai?",
    options: ["Nguyễn Lộc", "Lê Sáng", "Nguyễn Văn Chiếu", "Trần Huy Phong"],
    correct: 0
  },
  {
    question: "Vovinam ra đời năm nào?",
    options: ["1938", "1945", "1954", "1975"],
    correct: 0
  },
  {
    question: "Võ Việt Nam còn được gọi là gì?",
    options: ["Vovinam Viet Vo Dao", "Vovinam Vo Dao", "Vo Viet Nam", "Vovinam"],
    correct: 1
  },
  {
    question: "Vovinam là bộ môn võ của nước nào?",
    options: ["Thái Lan", "Hàn Quốc", "Việt Nam", "Trung Quốc"],
    correct: 2
  },
  {
    question: "Ý nghĩa của từ 'Vo' trong Vovinam là gì?",
    options: ["Võ thuật", "Quân đội", "Dân tộc", "Quốc gia"],
    correct: 0
  },
  {
    question: "Ý nghĩa của từ 'Vi' trong Vovinam là gì?",
    options: ["Võ thuật", "Quân đội", "Dân tộc", "Quốc gia"],
    correct: 2
  },
  {
    question: "Ý nghĩa của từ 'Nam' trong Vovinam là gì?",
    options: ["Võ thuật", "Quân đội", "Dân tộc", "Quốc gia"],
    correct: 3
  },
  {
    question: "Vovinam được phát triển từ những bộ môn võ nào?",
    options: ["Karate và Judo", "Võ cổ truyền Việt Nam", "Taekwondo", "Muay Thai"],
    correct: 1
  },
  {
    question: "Mục tiêu chính của Vovinam là gì?",
    options: ["Giải trí", "Tự vệ và rèn luyện thân thể", "Thi đấu chuyên nghiệp", "Giải trí"],
    correct: 1
  },
  {
    question: "Vovinam có bao nhiêu cấp đai?",
    options: ["6 cấp", "9 cấp", "12 cấp", "15 cấp"],
    correct: 1
  },
  {
    question: "Màu đai đầu tiên trong Vovinam là gì?",
    options: ["Đen", "Trắng", "Vàng", "Xanh"],
    correct: 1
  },
  {
    question: "Vovinam được công nhận là môn võ chính thức của Việt Nam từ năm nào?",
    options: ["1945", "1954", "1975", "1990"],
    correct: 0
  },
  {
    question: "Vovinam có những kỹ thuật nào?",
    options: ["Chỉ quyền cước", "Quyền, cước, đòn thế, binh khí", "Chỉ khiêu vũ", "Chỉ aerobic"],
    correct: 1
  },
  {
    question: "Nguyên tắc 'Luyện công phu' trong Vovinam nghĩa là gì?",
    options: ["Luyện tập chăm chỉ", "Luyện tập qua loa", "Luyện tập theo sở thích", "Luyện tập ít"],
    correct: 0
  },
  {
    question: "Vovinam nhấn mạnh yếu tố nào?",
    options: ["Sức mạnh thể chất", "Tinh thần kỷ luật và đạo đức", "Giải trí", "Thi đấu"],
    correct: 1
  },
  {
    question: "Vovinam có bài quyền biểu diễn nào?",
    options: ["Bài quyền 12 động tác", "Bài quyền 20 động tác", "Bài quyền 30 động tác", "Bài quyền 50 động tác"],
    correct: 0
  },
  {
    question: "Vovinam có những đòn thế nào?",
    options: ["Ném, vật, khóa khớp", "Chỉ đá", "Chỉ quyền", "Chỉ aerobic"],
    correct: 0
  },
  {
    question: "Vovinam có môn binh khí nào?",
    options: ["Kiếm, đao, côn, thương", "Chỉ súng", "Chỉ lựu đạn", "Chỉ xe tăng"],
    correct: 0
  },
  {
    question: "Vovinam có bài tập đối luyện không?",
    options: ["Không có", "Có, để thực hành kỹ thuật", "Chỉ tập đơn", "Chỉ tập nhóm"],
    correct: 1
  },
  {
    question: "Vovinam được phổ biến ở những nước nào?",
    options: ["Chỉ Việt Nam", "Việt Nam và một số nước châu Á", "Toàn thế giới", "Chỉ châu Âu"],
    correct: 2
  }
];

let index = 0;
let score = 0;
let answered = false;

function loadQuestion(){
  answered = false;
  document.getElementById("feedback").innerText = "";
  
  document.getElementById("progress").innerText = 
    "Câu " + (index+1) + " / " + questions.length;

  document.getElementById("question").innerText = questions[index].question;

  let html = "";
  questions[index].options.forEach((opt,i)=>{
    html += `<button class='btn' onclick='check(${i})'>${opt}</button>`;
  });

  document.getElementById("answers").innerHTML = html;
  document.getElementById("nextBtn").disabled = true;
}

function check(i){
  if(answered) return;
  answered = true;

  if(i === questions[index].correct){
    score++;
    document.getElementById("feedback").innerText = "✔ Đúng!";
    document.getElementById("feedback").style.color = "green";
  } else {
    document.getElementById("feedback").innerText =
      "✘ Sai - Đáp án đúng: " +
      questions[index].options[questions[index].correct];
    document.getElementById("feedback").style.color = "red";
  }
  
  // Disable các button
  document.querySelectorAll("#answers button").forEach(btn => btn.disabled = true);
  document.getElementById("nextBtn").disabled = false;
}

function nextQuestion(){
  index++;

  if(index < questions.length){
    loadQuestion();
  } else {
    document.getElementById("progress").innerText = "";
    document.getElementById("question").innerText = "Hoàn thành bài thi!";
    document.getElementById("answers").innerHTML = "";
    document.getElementById("feedback").innerText = "";
    document.getElementById("nextBtn").style.display = "none";
    
    let percentage = Math.round((score / questions.length) * 100);
    let resultText = "Điểm của bạn: " + score + "/" + questions.length + " (" + percentage + "%)";
    
    if(score >= 14){
      document.getElementById("result").innerText = resultText + "\n🎉 ĐẠT - Chúc mừng bạn đã hoàn thành bài thi!";
      document.getElementById("result").style.color = "#4caf50";
    } else {
      document.getElementById("result").innerText = resultText + "\n❌ CẦN ÔN TẬP THÊM - Hãy học thêm về Vovinam!";
      document.getElementById("result").style.color = "#f44336";
    }
  }
}

loadQuestion();
</script>

</body>
</html>
