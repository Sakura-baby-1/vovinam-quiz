<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viện Vovinam Toàn Cầu - Đăng Nhập</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-left">
      <div class="auth-brand">
        <h1>🥋 Viện Vovinam Toàn Cầu</h1>
        <p>Nền tảng học tập chính thức của Vovinam Quốc Tế</p>
      </div>
      <img src="https://images.unsplash.com/photo-1570295926550-444cd343c837?w=600&h=800&fit=crop" alt="Vovinam Training" class="auth-image">
    </div>

    <div class="auth-right">
      <div class="auth-forms">
        <!-- Login Form -->
        <form id="login-form" class="auth-form active">
          <h2>Đăng Nhập</h2>
          <p>Chào mừng đến với Viện Vovinam Toàn Cầu</p>

          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="your@email.com" required>
          </div>

          <div class="form-group">
            <label for="login-password">Mật Khẩu</label>
            <input type="password" id="login-password" placeholder="••••••••" required>
          </div>

          <div class="form-checkbox">
            <input type="checkbox" id="remember-me">
            <label for="remember-me">Ghi nhớ tôi</label>
          </div>

          <button type="submit" class="btn-primary">Đăng Nhập</button>

          <p class="form-switch">
            Chưa có tài khoản? <button type="button" id="to-signup" class="btn-link">Đăng Ký Ngay</button>
          </p>
        </form>

        <!-- Signup Form -->
        <form id="signup-form" class="auth-form">
          <h2>Đăng Ký Tài Khoản</h2>
          <p>Tham gia cộng đồng võ sinh toàn cầu</p>

          <div class="form-group">
            <label for="signup-fullname">Họ và Tên</label>
            <input type="text" id="signup-fullname" placeholder="Nguyễn Văn A" required>
          </div>

          <div class="form-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" placeholder="your@email.com" required>
          </div>

          <div class="form-group">
            <label for="signup-password">Mật Khẩu</label>
            <input type="password" id="signup-password" placeholder="••••••••" required>
          </div>

          <div class="form-group">
            <label for="signup-password-confirm">Xác Nhận Mật Khẩu</label>
            <input type="password" id="signup-password-confirm" placeholder="••••••••" required>
          </div>

          <div class="form-checkbox">
            <input type="checkbox" id="terms-agree" required>
            <label for="terms-agree">Tôi đồng ý với <a href="#" class="link">Điều khoản dịch vụ</a></label>
          </div>

          <button type="submit" class="btn-primary">Đăng Ký</button>

          <p class="form-switch">
            Đã có tài khoản? <button type="button" id="to-login" class="btn-link">Đăng Nhập</button>
          </p>
        </form>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
