<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thi Bằng Lái Xe 2026</title>

<style>
body{
  font-family: Arial;
  background: #f2f4f8;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  padding:20px;
}

.container{
  width:600px;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.15);
}

h1{
  text-align:center;
  color:#d32f2f;
  margin-top:0;
  font-size:28px;
  font-weight:bold;
}

.question{
  font-size:20px;
  margin-bottom:15px;
  font-weight:bold;
  line-height:1.4;
}

.btn{
  display:block;
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  background:#e0e0e0;
  cursor:pointer;
  font-size:16px;
  transition:0.2s;
  text-align:left;
}

.btn:hover{
  background:#cfd8dc;
}

.btn:disabled{
  background:#9e9e9e;
  color:#666;
  cursor:not-allowed;
}

.next{
  background:#1976d2;
  color:white;
  font-weight:bold;
  margin-top:20px;
}

.next:hover:not(:disabled){
  background:#0d47a1;
}

.feedback{
  margin-top:10px;
  font-weight:bold;
  font-size:18px;
}

.result{
  text-align:center;
  font-size:24px;
  color:green;
  margin-top:20px;
  font-weight:bold;
}

.progress{
  text-align:center;
  color:#666;
  margin-bottom:15px;
  font-size:14px;
}

.warning{
  background:#fff3cd;
  border:1px solid #ffeaa7;
  color:#856404;
  padding:10px;
  border-radius:5px;
  margin-bottom:15px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">
  <h1>THI BẰNG LÁI XE 2026</h1>
  
  <div class="warning">
    ⚠️ <strong>Lưu ý:</strong> Bài thi gồm 20 câu hỏi. Thời gian: 19 phút. Điểm đạt: 16/20 câu đúng.
  </div>
  
  <div class="progress" id="progress"></div>
  <div class="question" id="question"></div>
  <div id="answers"></div>

  <div class="feedback" id="feedback"></div>

  <button class="btn next" id="nextBtn" onclick="nextQuestion()">Câu tiếp</button>

  <div class="result" id="result"></div>
</div>

<script>
const questions = [
  {
    question: "Khi gặp biển báo 'Cấm đi thẳng' thì xe được phép:",
    options: ["Rẽ trái", "Rẽ phải", "Đi thẳng", "Không được phép đi tiếp"],
    correct: 3
  },
  {
    question: "Tốc độ tối đa cho phép trên đường cao tốc là:",
    options: ["60 km/h", "80 km/h", "100 km/h", "120 km/h"],
    correct: 3
  },
  {
    question: "Khi lái xe trên đường mưa, tài xế cần:",
    options: ["Tăng tốc để qua nhanh", "Giảm tốc độ và tăng khoảng cách", "Bật đèn pha", "Đi sát xe trước"],
    correct: 1
  },
  {
    question: "Biển báo hình tròn có nền xanh dương là biển:",
    options: ["Cấm", "Hiệu lệnh", "Chỉ dẫn", "Nguy hiểm"],
    correct: 1
  },
  {
    question: "Khi gặp đèn tín hiệu vàng, tài xế phải:",
    options: ["Tăng tốc vượt qua", "Dừng lại ngay", "Chuẩn bị dừng nếu an toàn", "Tiếp tục đi"],
    correct: 2
  },
  {
    question: "Nồng độ cồn tối đa cho phép trong máu là:",
    options: ["0 mg/100ml", "50 mg/100ml", "80 mg/100ml", "Không có giới hạn"],
    correct: 0
  },
  {
    question: "Khi chuyển làn đường, tài xế cần:",
    options: ["Quan sát gương chiếu hậu", "Bật đèn xi nhan", "Giảm tốc độ", "Tất cả các ý trên"],
    correct: 3
  },
  {
    question: "Biển báo 'Đường hẹp trái' có ý nghĩa:",
    options: ["Đường rộng bên trái", "Đường hẹp bên trái", "Cấm rẽ trái", "Chỉ đường một chiều"],
    correct: 1
  },
  {
    question: "Khi đỗ xe trên đường dốc, cần:",
    options: ["Chỉ cần kéo phanh tay", "Chèn bánh xe và kéo phanh tay", "Không cần làm gì", "Bật đèn cảnh báo"],
    correct: 1
  },
  {
    question: "Tài xế có được phép sử dụng điện thoại khi lái xe không?",
    options: ["Được, nếu dùng loa ngoài", "Không được trong mọi trường hợp", "Được khi dừng đèn đỏ", "Được nếu cầm tay"],
    correct: 1
  },
  {
    question: "Khi gặp xe ưu tiên (có đèn xanh đỏ), tài xế phải:",
    options: ["Vượt qua nhanh", "Nhường đường", "Đi song song", "Bấm còi"],
    correct: 1
  },
  {
    question: "Tốc độ tối thiểu trên đường cao tốc là:",
    options: ["30 km/h", "50 km/h", "60 km/h", "70 km/h"],
    correct: 2
  },
  {
    question: "Biển báo 'Cấm dừng và đỗ xe' có hình:",
    options: ["Hình tròn đỏ", "Hình vuông vàng", "Hình tam giác vàng", "Hình chữ nhật xanh"],
    correct: 0
  },
  {
    question: "Khi lái xe vào ban đêm, cần:",
    options: ["Tắt đèn pha", "Bật đèn pha", "Bật đèn cốt", "Không cần đèn"],
    correct: 1
  },
  {
    question: "Khoảng cách an toàn tối thiểu với xe phía trước là:",
    options: ["5 giây", "3 giây", "1 giây", "10 giây"],
    correct: 1
  },
  {
    question: "Khi gặp sương mù dày, tài xế nên:",
    options: ["Tăng tốc", "Giảm tốc và bật đèn sương mù", "Đi sát xe trước", "Bật đèn pha cao"],
    correct: 1
  },
  {
    question: "Biển báo 'Chú ý trẻ em' có hình:",
    options: ["Hình vuông", "Hình tròn", "Hình tam giác", "Hình chữ nhật"],
    correct: 2
  },
  {
    question: "Tài xế có được phép vượt xe ở đoạn đường cong không?",
    options: ["Được", "Không được", "Được nếu thấy rõ", "Được khi có biển cho phép"],
    correct: 1
  },
  {
    question: "Khi xe bị hỏng trên đường cao tốc, cần:",
    options: ["Đẩy xe ra lề đường", "Đặt biển cảnh báo và gọi cứu hộ", "Tiếp tục lái", "Đỗ xe giữa đường"],
    correct: 1
  },
  {
    question: "Tuổi tối thiểu để thi bằng lái xe B2 là:",
    options: ["16 tuổi", "18 tuổi", "21 tuổi", "25 tuổi"],
    correct: 1
  }
];

let index = 0;
let score = 0;
let answered = false;

function loadQuestion(){
  answered = false;
  document.getElementById("feedback").innerText = "";
  
  document.getElementById("progress").innerText = 
    "Câu " + (index+1) + " / " + questions.length;

  document.getElementById("question").innerText = questions[index].question;

  let html = "";
  questions[index].options.forEach((opt,i)=>{
    html += `<button class='btn' onclick='check(${i})'>${opt}</button>`;
  });

  document.getElementById("answers").innerHTML = html;
  document.getElementById("nextBtn").disabled = true;
}

function check(i){
  if(answered) return;
  answered = true;

  if(i === questions[index].correct){
    score++;
    document.getElementById("feedback").innerText = "✔ Đúng!";
    document.getElementById("feedback").style.color = "green";
  } else {
    document.getElementById("feedback").innerText =
      "✘ Sai - Đáp án đúng: " +
      questions[index].options[questions[index].correct];
    document.getElementById("feedback").style.color = "red";
  }
  
  // Disable các button
  document.querySelectorAll("#answers button").forEach(btn => btn.disabled = true);
  document.getElementById("nextBtn").disabled = false;
}

function nextQuestion(){
  index++;

  if(index < questions.length){
    loadQuestion();
  } else {
    document.getElementById("progress").innerText = "";
    document.getElementById("question").innerText = "Hoàn thành bài thi!";
    document.getElementById("answers").innerHTML = "";
    document.getElementById("feedback").innerText = "";
    document.getElementById("nextBtn").style.display = "none";
    
    let percentage = Math.round((score / questions.length) * 100);
    let resultText = "Điểm của bạn: " + score + "/" + questions.length + " (" + percentage + "%)";
    
    if(score >= 16){
      document.getElementById("result").innerText = resultText + "\n🎉 ĐẠT - Chúc mừng bạn đã thi đỗ!";
      document.getElementById("result").style.color = "#4caf50";
    } else {
      document.getElementById("result").innerText = resultText + "\n❌ TRƯỢT - Cần ôn tập thêm!";
      document.getElementById("result").style.color = "#f44336";
    }
  }
}

loadQuestion();
</script>

</body>
</html>
